<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>God's Eye — EU Funding Intelligence</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">◉</span>
        <div>
          <h1>God's Eye</h1>
          <p class="sub">EU funding intelligence &middot; ARVEST</p>
        </div>
      </div>
      <div class="meta">
        <span id="freshness" class="freshness">loading&hellip;</span>
        <span id="count" class="count"></span>
      </div>
    </header>

    <section id="macro" class="macro" aria-label="Macro indicators"></section>

    <section id="news" class="news" aria-label="Newswire"></section>

    <section class="filters">
      <input
        id="search"
        class="f-search"
        type="search"
        placeholder="Search title, call, keyword, ID…"
        autocomplete="off"
        spellcheck="false"
      />
      <select id="programme" class="f-select"><option value="">All programmes</option></select>
      <select id="status" class="f-select">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="forthcoming">Forthcoming</option>
      </select>
      <select id="deadline" class="f-select">
        <option value="">Any deadline</option>
        <option value="14">≤ 14 days</option>
        <option value="30">≤ 30 days</option>
        <option value="60">≤ 60 days</option>
        <option value="90">≤ 90 days</option>
      </select>
    </section>

    <main id="list" class="list" aria-live="polite">
      <div class="empty" id="empty">Loading calls&hellip;</div>
    </main>

    <footer class="foot">
      <span>Slice 1 &middot; SEDIA open calls</span>
      <span id="source"></span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
