# God's Eye — Netlify build configuration
# Phase 1: static site in /public + Functions 2.0 in /netlify/functions
# Slice 1: SEDIA fetch (scheduled + on-demand) -> Netlify Blobs -> /api/calls

[build]
  publish   = "public"
  functions = "netlify/functions"
  # No build command yet — static HTML is served as-is and Netlify
  # bundles the TypeScript functions automatically via esbuild.

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# --- Cadences live here (config, not code) ---
# Daily SEDIA refresh at 06:00 UTC. Calls don't change minute-to-minute.
[functions."cron-sedia"]
  schedule = "0 6 * * *"

# Daily macro refresh at 12:00 UTC — after BNR publishes the day's FX (~11:00 UTC).
[functions."cron-macro"]
  schedule = "0 12 * * *"

# Routing for /api/* is declared in-code (config.path in each .mts),
# using Functions 2.0 native routing — no redirect rules needed.
